name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: instagram-followback-macos
            build_command: npm run desktop:release
            artifact_glob: src-tauri/target/release/bundle/**/*
          - os: windows-latest
            artifact_name: instagram-followback-windows
            build_command: npm run desktop:build-windows
            artifact_glob: src-tauri/target/release/bundle/nsis/**/*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python package
        run: python -m pip install ".[live]"

      - name: Build desktop bundle
        run: ${{ matrix.build_command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
